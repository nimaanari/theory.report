name: Build

on:
  schedule:
    - cron: '30 * * * *'
  workflow_dispatch:
  push:
    branches:
      - 'main'

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Restore feed cache
        uses: actions/cache@v4
        with:
          path: |
            ./theory.db
            ./theory.db-journal
          key: feed-cache-${{ runner.os }}-${{ hashFiles('theory.version') }}-${{ github.run_id }}
          restore-keys: |
            feed-cache-${{ runner.os }}-${{ hashFiles('theory.version') }}-
      - name: Build
        run: make build
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
